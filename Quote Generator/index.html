<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="The Curated Whisper — A beautifully designed random quote generator with categories, dark mode, auto-play, and sharing." />
  <title>The Curated Whisper — Random Quote Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Toast Notification -->
  <div id="toast" class="toast" role="alert" aria-live="polite"></div>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <a href="#" class="logo" aria-label="The Curated Whisper Home">The Curated Whisper</a>
      <nav class="category-nav" aria-label="Quote categories">
        <button class="cat-btn active" data-category="all" id="cat-all">All</button>
        <button class="cat-btn" data-category="motivation" id="cat-motivation">Motivation</button>
        <button class="cat-btn" data-category="success" id="cat-success">Success</button>
        <button class="cat-btn" data-category="life" id="cat-life">Life</button>
        <button class="cat-btn" data-category="wisdom" id="cat-wisdom">Wisdom</button>
      </nav>
      <div class="header-actions">
        <button class="icon-btn" id="theme-toggle" aria-label="Toggle dark mode" title="Toggle theme">
          <span class="icon-sun">☀️</span>
          <span class="icon-moon">🌙</span>
        </button>
        <button class="icon-btn" id="autoplay-icon-btn" aria-label="Toggle auto-play" title="Auto-play">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Hero -->
  <main class="main" id="main-content">
    <section class="hero" aria-label="Quote display section">
      <div class="gradient-orb orb-1"></div>
      <div class="gradient-orb orb-2"></div>
      <div class="gradient-orb orb-3"></div>

      <!-- Quote Card -->
      <div class="quote-card" id="quote-card" aria-live="polite" aria-atomic="true">
        <!-- Loading Spinner -->
        <div class="spinner-overlay" id="spinner-overlay" aria-hidden="true">
          <div class="spinner"></div>
        </div>

        <div class="quote-body" id="quote-body">
          <span class="quote-mark" aria-hidden="true">&ldquo;</span>
          <blockquote class="quote-text" id="quote-text">Believe you can and you're halfway there.</blockquote>
          <div class="quote-meta">
            <div class="auth-info">
              <p class="author-name" id="author-name">Theodore Roosevelt</p>
              <p class="author-role" id="author-tag">26TH U.S. PRESIDENT</p>
            </div>
            <div class="quote-actions">
              <button class="action-btn" id="copy-btn" aria-label="Copy quote to clipboard" title="Copy">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              </button>
              <button class="action-btn" id="share-btn" aria-label="Share on Twitter/X" title="Share on X">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.259 5.631 5.905-5.631Zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
              </button>
              <button class="action-btn" id="favorite-btn" aria-label="Favourite quote" title="Favourite">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
              </button>
            </div>
          </div>
        </div>

        <!-- Category Badge -->
        <span class="category-badge" id="category-badge">motivation</span>
      </div>

      <!-- Controls -->
      <div class="controls">
        <button class="generate-btn" id="generate-btn" aria-label="Generate new quote">
          <svg class="btn-icon spin-on-click" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1 0-6"/></svg>
          Generate Quote
        </button>

        <div class="autoplay-control">
          <label class="toggle-switch" for="autoplay-toggle" aria-label="Auto-play toggle">
            <input type="checkbox" id="autoplay-toggle" role="switch" aria-checked="false" />
            <span class="toggle-slider"></span>
          </label>
          <span class="autoplay-label">Auto-play</span>
        </div>

        <div class="autoplay-progress-wrap" id="autoplay-progress-wrap" aria-hidden="true">
          <progress class="autoplay-progress" id="autoplay-progress" max="100" value="0"></progress>
          <span class="progress-label" id="progress-label">NEXT IN 15S</span>
        </div>
      </div>
    </section>

    <!-- Stats Bar -->
    <section class="stats-bar" aria-label="Collection stats">
      <div class="stat-item">
        <span class="stat-number" id="stat-count">50</span>
        <span class="stat-label">Curated Quotes</span>
      </div>
      <div class="stat-divider" aria-hidden="true"></div>
      <div class="stat-item">
        <span class="stat-number">5</span>
        <span class="stat-label">Categories</span>
      </div>
      <div class="stat-divider" aria-hidden="true"></div>
      <div class="stat-item">
        <span class="stat-number" id="stat-favorites">0</span>
        <span class="stat-label">Favourites</span>
      </div>
    </section>

    <!-- Favorites Section -->
    <section class="favourites-section" id="favourites-section" aria-label="Favourite quotes" hidden>
      <h2 class="section-title">Your Favourites</h2>
      <div class="favourites-grid" id="favourites-grid"></div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <p class="footer-brand">The Curated Whisper</p>
    <p class="footer-copy">&copy; 2025 The Curated Whisper. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
